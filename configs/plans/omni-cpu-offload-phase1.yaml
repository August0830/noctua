# Plan: omni-397b-cpu-offload-phase1
#
# 检查点执行计划 — Phase 1 可行性确认
# Agent 生成方案 → 人类在生产上执行 → 结果填回
#
# 使用方式：
#   1. Agent 生成此 plan（draft）
#   2. 人类在每个 checkpoint 执行操作，记录结果
#   3. 完成后更新 status: done

plan_id: "omni-cpu-offload-phase1-20260720"
domain: rome
agent_template: rome
status: draft
created_by: human
created_at: "2026-07-20T10:00:00Z"

context:
  episodes: []
  agent_cases: []
  knowledge_docs:
    - "cpu-offload-analysis"
    - "omni-397b-optimization-plan"
    - "inference-roofline-flowchart"
  skills:
    - "h20-batch-tuning"

steps:
  # ── Step 1: 前置确认 ──────────────────────────────────────────
  - id: "check-primus-version"
    description: "检查生产 SGLang primus fork 是否支持 precomputed_embedding"
    type: checkpoint
    checkpoint:
      approval: required
      prompt: |
        在生产 Omni-397B Pod 中执行：
        
        kubectl exec -it <omni-pod> -- python -c "
        import sglang; print(sglang.__version__)
        from sglang.srt.managers.io_struct import GenerateReqInput
        print('image_data field:', hasattr(GenerateReqInput, 'image_data'))
        "
        
        记录结果：
        - sglang 版本: ______
        - image_data 支持: yes / no
        
        判定：版本 >= v0.4.7 且有 image_data → ✅ 通过，进入 Step 2
        否则 → ❌ 阻断，需要先升级镜像
    actions: [approve, reject]

  # ── Step 2: CPU 节点信息 ──────────────────────────────────────
  - id: "check-cpu-node"
    description: "确认目标 CPU 节点配置"
    type: checkpoint
    checkpoint:
      approval: required
      prompt: |
        在生产集群中执行：
        
        kubectl get nodes -l <node-label> -o wide
        kubectl describe node <target-cpu-node> | grep -A5 "Capacity:"
        
        记录结果：
        - 节点名: ______
        - CPU cores: ______
        - RAM: ______ GB
        - CPU 型号: ______
        - IPEX 可用: yes / no (ldconfig -p | grep ipex)
    actions: [approve, modify]

  # ── Step 3: CPU ViT Benchmark ─────────────────────────────────
  - id: "cpu-vit-benchmark"
    description: "在生产 CPU 节点实测 ViT + Projector forward 耗时"
    type: checkpoint
    checkpoint:
      approval: required
      prompt: |
        提交 RayJob 到生产测试集群，运行 CPU ViT benchmark：
        
        RayJob 配置:
        - Worker: 1 × CPU node (no GPU)，48 cores
        - Entrypoint: python cpu_vit_bench.py --model omni-397b --images ./sample/ --repeats 100
        
        采集指标（从 benchmark 输出）：
        - ViT forward p50: ______ ms
        - ViT forward p95: ______ ms  
        - ViT forward p99: ______ ms
        - Projector forward: ______ ms
        - 单图总耗时 p50: ______ ms
        
        判定：
        - p50 < 200ms → ✅ IPEX 级别，所有场景可行
        - p50 200-500ms → ⚠️ 离线 batch 优先
        - p50 > 500ms → ❌ 仅离线 batch 可行
    actions: [approve, reject, modify]

  # ── Step 4: 吞吐匹配重算 ──────────────────────────────────────
  - id: "recalc-throughput"
    description: "用实测 CPU 耗时重新验算吞吐匹配"
    type: auto
    tool: analyze
    params:
      cpu_vit_ms: "${step.cpu-vit-benchmark.output.vit_p50_ms}"
      cpu_cores: "${step.check-cpu-node.output.cores}"
      decode_time_s: 6.2
      max_running: 16
    expected_output: "throughput_recalc.md"

  # ── Step 5: 审查重算结果 ──────────────────────────────────────
  - id: "review-throughput"
    description: "确认 CPU 能否喂饱 GPU"
    type: checkpoint
    checkpoint:
      approval: required
      prompt: |
        吞吐匹配重算结果：
        
        CPU 余量 = ${step.recalc-throughput.output.headroom}
        
        判定：
        - 余量 >= 1.5x → ✅ 安全，进入 Phase 2 实验验证
        - 余量 1.0-1.5x → ⚠️ 边际，降低 max_running 或加速 ViT
        - 余量 < 1.0x → ❌ CPU 不足，需要更多核或 GPU hybrid
        
        下一步决策：
        - 通过 → 进入 Phase 2（离线 batch 验证）
        - 不通过 → 评估 GPU hybrid 方案（图片数 > 阈值 → GPU，否则 CPU）
    actions: [approve, reject, modify]

  # ── Step 6: 镜像构建准备 ──────────────────────────────────────
  - id: "prepare-image"
    description: "如 Phase 1 通过，准备 CPU offload 镜像"
    type: checkpoint
    checkpoint:
      approval: optional
      prompt: |
        构建新的 SGLang primus 镜像（含 CPU ViT 支持）：
        
        Dockerfile 变更：
        - 添加 oneDNN / IPEX 依赖（如果可用）
        - 设置环境变量 ENABLE_CPU_VIT=true
        - 添加 precomputed_embedding 处理逻辑（如需要）
        
        Aone CI 构建: <pipeline_url>
    actions: [approve, skip, modify]

  # ── Step 7: Phase 1 总结 ──────────────────────────────────────
  - id: "phase1-summary"
    description: "汇总 Phase 1 结果，决定是否进入 Phase 2"
    type: checkpoint
    checkpoint:
      approval: required
      prompt: |
        Phase 1 结论汇总：
        
        1. SGLang 版本支持: ${step.check-primus-version.output}  
        2. CPU ViT p50 耗时: ${step.cpu-vit-benchmark.output.vit_p50_ms}ms
        3. CPU→GPU 吞吐余量: ${step.recalc-throughput.output.headroom}x
        
        关键未知项解决情况：
        - U1 CPU ViT 实测: ${step.recapped. U1_status}
        - U2 primus 支持: ${step.recapped. U2_status}
        - U3 IPEX 加速: ${step.recapped. U3_status}
        - U5 CPU 核数: ${step.recapped. U5_status}
        
        推荐决策：
        [ ] 进入 Phase 2 — 离线 batch 验证
        [ ] 暂停 — 存在阻断项需要解决
        [ ] 调整方案 — 修改实施路径
    actions: [approve, reject, modify]
